<!doctype html>
<html lang="ru">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Лабораторная работа N2 - GeoServer и OpenLayers</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/ol@10.4.0/ol.css">
    <link rel="stylesheet" href="./styles.css">
  </head>
  <body>
    <header class="topbar">
      <div>
        <h1>Публикация геоданных</h1>
        <p>PostGIS -> GeoServer WMS -> OpenLayers</p>
      </div>
      <div class="status" id="status">Загрузка слоя...</div>
    </header>

    <main class="layout">
      <section class="map-shell" aria-label="Карта">
        <div id="map"></div>
        <div class="popup" id="popup"></div>
      </section>

      <aside class="panel">
        <h2>Слой</h2>
        <dl>
          <dt>Workspace</dt>
          <dd>lab2</dd>
          <dt>Store</dt>
          <dd>postgis</dd>
          <dt>Layer</dt>
          <dd>samara_places</dd>
          <dt>Service</dt>
          <dd>WMS через /geoserver</dd>
        </dl>
      </aside>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/ol@10.4.0/dist/ol.js"></script>
    <script src="./app.js"></script>
  </body>
</html>
